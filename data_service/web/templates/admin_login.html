<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — iPronto</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #092a56 0%, #1a4a8a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
    }
    .logo { font-size: 2.2rem; margin-bottom: 10px; }
    h1    { font-size: 1.45rem; font-weight: 700; color: #092a56; margin-bottom: 4px; }
    .sub  { color: #888; font-size: .9rem; margin-bottom: 30px; }
    .field { margin-bottom: 18px; }
    label  {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #dde3f0;
      border-radius: 8px;
      font-size: .95rem;
      color: #222;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #092a56; }
    .error-box {
      background: #fff5f5;
      border: 1px solid #fcc;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .87rem;
      margin-bottom: 18px;
    }
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #092a56;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .97rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background .2s;
    }
    button[type="submit"]:hover { background: #1a4a8a; }
    .back { text-align: center; margin-top: 18px; }
    .back a { color: rgba(255,255,255,.6); font-size: .85rem; text-decoration: none; }
    .back a:hover { color: #fff; }
  </style>
</head>
<body>
  <div>
    <div class="card">
      <div class="logo">🏠</div>
      <h1>iPronto Admin</h1>
      <p class="sub">Sign in to access the admin dashboard</p>

      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/admin/login">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" type="text" name="username" placeholder="admin" autofocus required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit">Sign In →</button>
      </form>
    </div>

    <div class="back">
      <a href="/">← Back to iPronto</a>
    </div>
  </div>

  <script>
    document.getElementById('username').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  </script>
</body>
</html>
