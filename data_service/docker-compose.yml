services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mls_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mlsuser
      MONGO_INITDB_ROOT_PASSWORD: mlspassword
      MONGO_INITDB_DATABASE: mls
    volumes:
      - mongo_data:/data/db
      - ./db:/docker-entrypoint-initdb.d:ro   # runs db/init.js on first start
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Scraper / importer (Selenium + cron + status UI) ──────────────────────
  app:
    build:
      context: ./mls_service
      dockerfile: Dockerfile
    container_name: mls_app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MLS_USERNAME: ${MLS_USERNAME}
      MLS_PASSWORD: ${MLS_PASSWORD}
      HEADLESS: "true"
      MONGO_URI: mongodb://mlsuser:mlspassword@mongo:27017/mls?authSource=admin
      MONGO_DB: mls
    ports:
      - "8081:8081"         # scraper status dashboard → http://localhost:8081
    volumes:
      - app_data:/app/data

  # ── Flask web server (listings browser) ───────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mls_web
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mlsuser:mlspassword@mongo:27017/mls?authSource=admin
      MONGO_DB: mls
    ports:
      - "8080:5000"         # listings browser → http://localhost:8080

volumes:
  mongo_data:
  app_data:
