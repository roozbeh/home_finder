services:

  # ── MongoDB (local) ─────────────────────────────────────────────────────────
  # Commented out — now using MongoDB Atlas (cloud).
  # Uncomment to run a local instance for testing/development.
  #
  # mongo:
  #   image: mongo:7
  #   container_name: mls_mongo
  #   restart: unless-stopped
  #   command: ["mongod", "--quiet", "--logpath", "/dev/null"]
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
  #     MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
  #     MONGO_INITDB_DATABASE: mls
  #   volumes:
  #     - mongo_data:/data/db
  #     - ./db:/docker-entrypoint-initdb.d:ro
  #   healthcheck:
  #     test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s

  # ── Scraper / importer (Selenium + cron + status UI) ──────────────────────
  app:
    build:
      context: ./mls_service
      dockerfile: Dockerfile
    container_name: mls_app
    restart: unless-stopped
    env_file:
      - env                      # MONGO_URI points to Atlas
    environment:
      HEADLESS: "true"
    ports:
      - "8081:8081"         # scraper status dashboard → http://localhost:8081
    volumes:
      - app_data:/app/data

  # ── Flask web server (listings browser) ───────────────────────────────────
  web:
    build:
      context: .                 # data_service root — gives access to web/ AND agentic/
      dockerfile: web/Dockerfile
    container_name: mls_web
    restart: unless-stopped
    env_file:
      - env                      # MONGO_URI points to Atlas
    ports:
      - "8080:5000"         # home finder chat + listings browser → http://localhost:8080
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535

volumes:
  # mongo_data:   # uncomment when re-enabling local mongo
  app_data:
